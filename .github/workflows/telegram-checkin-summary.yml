name: Telegram Check-in Summary

on:
  workflow_dispatch:
  schedule:
    # 10:05, 14:05, 18:05 Asia/Bangkok (UTC+7)
    - cron: "5 3 * * *"
    - cron: "5 7 * * *"
    - cron: "5 11 * * *"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger summary endpoint
        env:
          TELEGRAM_SUMMARY_ENDPOINT: ${{ secrets.TELEGRAM_SUMMARY_ENDPOINT }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$TELEGRAM_SUMMARY_ENDPOINT" ]; then
            echo "Missing TELEGRAM_SUMMARY_ENDPOINT GitHub secret"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET GitHub secret"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "$TELEGRAM_SUMMARY_ENDPOINT" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
